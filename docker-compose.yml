# =====================================================================
# 化工包装袋报价系统 - 单机自托管编排
# 用法：cp .env.example .env  → 改 SESSION_SECRET → docker compose up -d --build
# 详见 docs/04-deployment.md §3
# =====================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cbq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cbq_dev_pwd_change_me}
      POSTGRES_DB: cbq
    volumes:
      - cbq_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbq -d cbq"]
      interval: 5s
      timeout: 3s
      retries: 10
    # 不暴露 5432 给宿主机；如需本地连工具调试，单独 docker compose -f compose.dev.yml 加端口
    expose:
      - "5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://cbq:${POSTGRES_PASSWORD:-cbq_dev_pwd_change_me}@db:5432/cbq?schema=public"
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required, generate with: openssl rand -base64 32}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  cbq_pg_data:
    driver: local
